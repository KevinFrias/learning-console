<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Portal</title>
  <style>
    :root {
      --bg: #0b0d13;
      --bg2: #12151f;
      --bg3: #1a1e2c;
      --border: #262c3f;
      --text: #e7eaf0;
      --muted: #6f7995;
      --accent: #6ee7ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px;
      background: rgba(11,13,19,.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 16px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--accent);
    }
    header .controls { display: flex; gap: 8px; align-items: center; }
    header a, button.secondary {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    header a:hover, button.secondary:hover { color: var(--text); border-color: #3d455e; }
    main { padding: 28px; max-width: 1200px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }

    /* Directory grid */
    .dir-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .dir-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 20px;
      cursor: pointer;
      transition: transform .12s, border-color .15s, background .15s;
    }
    .dir-card:hover {
      transform: translateY(-2px);
      border-color: #3d455e;
      background: var(--bg3);
    }
    .dir-card .name {
      font-size: 20px; font-weight: 600;
      word-break: break-word;
    }
    .dir-card .meta {
      margin-top: 8px; font-size: 13px; color: var(--muted);
      min-height: 18px;
    }

    /* Section header inside a directory */
    .section-header {
      margin-bottom: 22px;
    }
    .section-header .crumb {
      color: var(--muted); font-size: 13px;
      cursor: pointer;
    }
    .section-header .crumb:hover { text-decoration: underline; color: var(--text); }
    .section-header .title {
      font-size: 42px;
      font-weight: 700;
      margin-top: 6px;
      letter-spacing: -0.02em;
      line-height: 1.1;
      word-break: break-word;
    }
    .page-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .page-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 18px;
      cursor: pointer;
      font-size: 16px;
      transition: transform .1s, border-color .15s;
    }
    .page-item:hover { transform: translateY(-1px); border-color: #3d455e; }
    .page-item small { display: block; color: var(--muted); font-size: 12px; margin-top: 4px; }

    /* Content iframe */
    .iframe-wrap {
      margin-top: 18px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .iframe-wrap iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 150px);
      border: 0;
      background: white;
    }
    .empty {
      color: var(--muted);
      padding: 60px 20px;
      text-align: center;
      font-size: 14px;
    }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <header>
    <h1>HTML Portal</h1>
    <div class="controls">
      <button class="secondary" onclick="goHome()">Home</button>
    </div>
  </header>

  <main>
    <!-- DIRECTORY LISTING -->
    <section id="view-dirs" class="view active">
      <div class="section-header">
        <div class="title">Directories</div>
        <div style="color:var(--muted); margin-top:8px;">Select a directory to browse pages</div>
      </div>
      <div id="dir-grid" class="dir-grid">
        <div class="empty">Loading…</div>
      </div>
    </section>

    <!-- DIRECTORY VIEW -->
    <section id="view-pages" class="view">
      <div class="section-header">
        <div class="crumb" onclick="goHome()">← Directories</div>
        <div id="dir-title" class="title"></div>
        <div id="dir-meta" style="color:var(--muted); margin-top:8px;"></div>
      </div>
      <div id="page-list" class="page-list"></div>
    </section>

    <!-- PAGE VIEW -->
    <section id="view-page" class="view">
      <div class="section-header">
        <div class="crumb" onclick="goDir()">← <span id="page-dir-name"></span></div>
        <div id="page-title" class="title"></div>
      </div>
      <div class="iframe-wrap">
        <iframe id="page-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
    </section>
  </main>

  <script>
    const API = '/api';
    let currentDir = '';

    async function loadDirectories() {
      const res = await fetch(`${API}/directories`);
      const data = await res.json();
      const grid = document.getElementById('dir-grid');
      grid.innerHTML = '';
      if (data.directories.length === 0) {
        grid.innerHTML = '<div class="empty">No directories with HTML files found. Add some to <code>pages/</code>.</div>';
        return;
      }
      for (const dir of data.directories) {
        const el = document.createElement('div');
        el.className = 'dir-card';
        el.innerHTML = `<div class="name">${escape(dir.name)}</div><div class="meta"></div>`;
        el.addEventListener('click', () => openDir(dir.path));
        grid.appendChild(el);
      }
    }

    async function openDir(dirPath) {
      currentDir = dirPath;
      const res = await fetch(`${API}/pages/${encodeURIComponent(dirPath)}`);
      const data = await res.json();
      showView('view-pages');
      document.getElementById('dir-title').textContent = data.directory;
      const meta = document.getElementById('dir-meta');
      meta.textContent = data.pages.length === 1 ? '1 page' : `${data.pages.length} pages`;
      const list = document.getElementById('page-list');
      list.innerHTML = '';
      if (data.pages.length === 0) {
        list.innerHTML = '<div class="empty">No HTML files found.</div>';
        return;
      }
      for (const page of data.pages) {
        const el = document.createElement('div');
        el.className = 'page-item';
        el.innerHTML = `${escape(page.name)}<small>${escape(page.filename)}</small>`;
        el.addEventListener('click', () => openPage(page.path));
        list.appendChild(el);
      }
    }

    async function openPage(path) {
      const res = await fetch(`${API}/content/${encodeURIComponent(path)}`);
      if (!res.ok) {
        showView('view-page');
        document.getElementById('page-title').textContent = 'Error';
        document.getElementById('page-dir-name').textContent = currentDir;
        const frame = document.getElementById('page-frame');
        frame.srcdoc = '<body style="background:#fff;padding:30px;font-family:sans-serif;"><div style="color:#c00">Failed to load page.</div></body>';
        return;
      }
      const data = await res.json();
      showView('view-page');
      document.getElementById('page-title').textContent = path.split('/').slice(-1)[0].replace(/\.html?$/i, '');
      document.getElementById('page-dir-name').textContent = currentDir;
      const frame = document.getElementById('page-frame');
      frame.srcdoc = data.content;
    }

    function goDir() {
      if (currentDir) openDir(currentDir);
      else goHome();
    }
    function goHome() { showView('view-dirs'); }

    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      window.scrollTo(0, 0);
    }

    function escape(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', loadDirectories);
  </script>
</body>
</html>
