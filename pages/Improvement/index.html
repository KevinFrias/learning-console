<style>
/* ============ TOKENS ============ */
:root{
  --ink:#07070a;          /* base background */
  --ink-2:#0b0c0f;        /* app frame */
  --panel:#111214;        /* surfaces */
  --panel-2:#17181c;      /* raised surfaces */
  --line:rgba(231,233,234,.10);
  --line-2:rgba(231,233,234,.06);
  --text:#e7e9ea;         /* primary (warm off-white) */
  --muted:#868c92;        /* secondary */
  --faint:#4d5257;        /* tertiary */
  --consolidate:#b98a3a;  /* warm: strength, consolidation, due */
  --retrieve:#8fe6f0;     /* cool: retrieval, testing, action */
  --alert:#d43b35;        /* warm brick: warnings, don't-space */
  --violet:#8fe6f0;       /* phase/advanced accent */
  --radius:1px;
  --radius-sm:1px;
  --shadow:0 1px 0 rgba(255,255,255,.03) inset, 3px 3px 0 rgba(0,0,0,.55);
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:"IBM Plex Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --disp:"Oswald",var(--sans);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    linear-gradient(rgba(143,230,240,.025) 1px, transparent 1px) 0 0/40px 40px,
    linear-gradient(90deg, rgba(143,230,240,.025) 1px, transparent 1px) 0 0/40px 40px,
    var(--ink);
  background-attachment:fixed;
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
::selection{background:rgba(143,230,240,.28)}
a{color:var(--retrieve);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit}
h1,h2,h3,h4{font-family:var(--disp);font-weight:600;line-height:1.15;margin:0}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* ============ APP FRAME ============ */
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.sidebar{
  background:var(--ink-2);
  border-right:1px solid var(--line);
  padding:22px 16px 30px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 20px}
.brand-mark{width:30px;height:30px;flex:0 0 auto}
.brand-name{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:1px;text-transform:uppercase}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.nav-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);padding:14px 10px 6px}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 11px;border-radius:var(--radius-sm);
  color:var(--muted);cursor:pointer;border:1px solid transparent;
  font-size:14px;user-select:none;transition:background .12s,color .12s;
}
.nav-item:hover{background:var(--panel);color:var(--text)}
.nav-item.active{background:var(--panel-2);color:var(--text);border-color:var(--line)}
.nav-item .ic{width:17px;height:17px;flex:0 0 auto;opacity:.85}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:11px;background:var(--consolidate);color:#140d05;border-radius:1px;padding:1px 7px;font-weight:600}
.nav-item .nav-lv{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:var(--faint)}
.nav-item.active .nav-lv{color:var(--retrieve)}

.main{min-width:0;padding:34px clamp(18px,4vw,52px) 80px;max-width:1080px}
.topbar{display:none}

/* ============ TYPE / HEADERS ============ */
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--retrieve);margin-bottom:10px}
.page-title{font-size:clamp(26px,4vw,36px);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.page-intro{color:var(--muted);max-width:64ch;margin-bottom:26px}
.section-title{font-size:17px;letter-spacing:.4px;text-transform:uppercase;margin:34px 0 14px;display:flex;align-items:center;gap:10px}
.section-title .rule{flex:1;height:1px;background:var(--line-2)}

/* ============ CARDS / PANELS ============ */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card + .card{margin-top:16px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.stack{display:flex;flex-direction:column;gap:14px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:14px}

/* ============ BUTTONS / INPUTS ============ */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--panel-2);color:var(--text);
  border:1px solid var(--line);border-radius:1px;
  padding:9px 14px;font-family:var(--mono);font-size:12.5px;font-weight:500;cursor:pointer;
  text-transform:uppercase;letter-spacing:.6px;
  transition:border-color .12s,background .12s,transform .05s;
}
.btn:hover{border-color:rgba(231,233,234,.28)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--retrieve);color:#04070a;border-color:transparent;font-weight:600}
.btn.primary:hover{filter:brightness(1.06)}
.btn.warm{background:var(--consolidate);color:#140d05;border-color:transparent;font-weight:600}
.btn.warm:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent}
.btn.danger{color:var(--alert);border-color:rgba(212,59,53,.4)}
.btn.sm{padding:6px 11px;font-size:13px}
.btn:disabled{opacity:.4;cursor:not-allowed}
label.field{display:block;margin-bottom:14px}
label.field > span{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input[type=text],input[type=number],input[type=date],textarea,select{
  width:100%;background:var(--ink);color:var(--text);
  border:1px solid var(--line);border-radius:1px;
  padding:10px 12px;font-family:inherit;font-size:14px;
}
textarea{resize:vertical;min-height:64px;line-height:1.5}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--retrieve);box-shadow:0 0 0 3px rgba(143,230,240,.15)}
input.mono,.rangeval{font-family:var(--mono)}
.hint{font-size:12px;color:var(--faint);margin-top:5px}

/* ============ CHIPS / TAGS / PILLS ============ */
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:1px;border:1px solid var(--line)}
.pill.novice{color:var(--retrieve);border-color:rgba(143,230,240,.4)}
.pill.intermediate{color:var(--consolidate);border-color:rgba(185,138,58,.4)}
.pill.advanced{color:var(--violet);border-color:rgba(143,230,240,.45)}
.pill.due{color:var(--consolidate);border-color:rgba(185,138,58,.5);background:rgba(185,138,58,.08)}
.pill.ok{color:var(--retrieve)}
.tag{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);border-radius:1px;padding:2px 8px}

/* ============ DO / DONT ============ */
.dd{display:grid;gap:14px;grid-template-columns:1fr 1fr}
.dd .col{border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px;background:var(--ink)}
.dd .col.do{border-color:rgba(143,230,240,.28)}
.dd .col.dont{border-color:rgba(212,59,53,.28)}
.dd h4{font-family:var(--mono);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.dd .do h4{color:var(--retrieve)}
.dd .dont h4{color:var(--alert)}
.dd ul{margin:0;padding-left:2px;list-style:none}
.dd li{position:relative;padding-left:20px;margin:7px 0;font-size:13.5px;color:var(--text)}
.dd .do li::before{content:"+";position:absolute;left:2px;color:var(--retrieve);font-weight:700}
.dd .dont li::before{content:"–";position:absolute;left:4px;color:var(--alert);font-weight:700}

/* ============ CHECKLIST ============ */
.check{display:flex;gap:11px;align-items:flex-start;padding:10px 12px;border-radius:1px;cursor:pointer;border:1px solid transparent}
.check:hover{background:var(--ink)}
.check .box{width:19px;height:19px;flex:0 0 auto;margin-top:1px;border-radius:1px;border:1.5px solid var(--faint);display:grid;place-items:center;transition:.12s}
.check.on .box{background:var(--retrieve);border-color:var(--retrieve)}
.check.on .box svg{opacity:1}
.check .box svg{width:12px;height:12px;opacity:0}
.check.on .txt{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--faint)}
.check .txt{font-size:14px}
.check .txt small{display:block;color:var(--faint);font-size:12px;text-decoration:none}

/* ============ TABLE ============ */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);font-weight:500;padding:8px 12px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line-2);vertical-align:top}
.tbl tr:hover td{background:rgba(255,255,255,.015)}

/* ============ CALLOUT ============ */
.callout{border-left:3px solid var(--consolidate);background:rgba(185,138,58,.06);padding:13px 16px;border-radius:0;font-size:14px}
.callout.alert{border-color:var(--alert);background:rgba(212,59,53,.07)}
.callout.cool{border-color:var(--retrieve);background:rgba(143,230,240,.06)}
.callout strong{color:var(--text)}

/* ============ TIMER ============ */
.timer-display{font-family:var(--mono);font-size:54px;font-weight:500;letter-spacing:1px;text-align:center;padding:10px 0 4px}
.timer-step{text-align:center;color:var(--muted);font-size:14px;margin-bottom:14px}
.timer-track{height:6px;background:var(--ink);border-radius:0;overflow:hidden;margin:14px 0}
.timer-fill{height:100%;background:var(--retrieve);border-radius:0;transition:width .3s linear}

/* ============ CURVE / STAT ============ */
.stat{display:flex;flex-direction:column;gap:2px}
.stat .num{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1}
.stat .lab{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--faint)}
.curve-wrap{background:var(--ink);border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px}

/* ============ RANGE ============ */
.rangebox{display:flex;align-items:center;gap:14px}
input[type=range]{flex:1;accent-color:var(--retrieve)}
.rangeval{min-width:52px;text-align:right;font-size:18px}

/* ============ EMPTY / MISC ============ */
.empty{text-align:center;color:var(--muted);padding:34px 20px;border:1px dashed var(--line);border-radius:var(--radius)}
.empty h3{color:var(--text);margin-bottom:6px}
.divider{height:1px;background:var(--line-2);margin:22px 0}
.kbd{font-family:var(--mono);font-size:11px;background:var(--panel-2);border:1px solid var(--line);border-bottom-width:2px;border-radius:1px;padding:1px 6px}
.warnsign{text-align:center;padding:8px 0}
.warnsign .big{font-family:var(--disp);font-size:22px;line-height:1.35;max-width:32ch;margin:0 auto 14px}
.warnsign .eq{font-family:var(--mono);color:var(--muted);font-size:14px;margin:4px 0}
.warnsign .eq b{color:var(--consolidate)}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);border-radius:1px;padding:11px 18px;font-size:14px;box-shadow:3px 3px 0 rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.25s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(143,230,240,.5)}

/* mobile nav toggle */
.menu-btn{display:none}

/* ============ RESPONSIVE ============ */
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:40;width:260px;left:0;top:0;transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 0 40px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;opacity:0;pointer-events:none;transition:.2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .main{padding-top:70px}
  .topbar{display:flex;position:fixed;top:0;left:0;right:0;height:56px;align-items:center;gap:12px;padding:0 16px;background:var(--ink-2);border-bottom:1px solid var(--line);z-index:30}
  .menu-btn{display:inline-grid;place-items:center;width:38px;height:38px;background:var(--panel);border:1px solid var(--line);border-radius:1px;cursor:pointer;color:var(--text)}
  .topbar .brand-name{font-size:15px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .dd{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="Open menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
  <span class="brand-name">Learning Console</span>
</div>
<div class="scrim" id="scrim"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
        <path d="M2 11V2h9M38 11V2h-9M2 29v9h9M38 29v9h-9" stroke="#8fe6f0" stroke-width="1.6"/>
        <line x1="20" y1="7" x2="20" y2="33" stroke="#8fe6f0" stroke-width="1.4"/>
        <line x1="10" y1="20" x2="30" y2="20" stroke="#4d5257" stroke-width="1"/>
        <rect x="17" y="17" width="6" height="6" fill="#07070a" stroke="#b98a3a" stroke-width="1.4"/>
      </svg>
      <div>
        <div class="brand-name">Learning Console</div>
        <div class="brand-sub">trace · space · verify</div>
        <div class="brand-sub" id="stratum" style="color:var(--retrieve);margin-top:2px"></div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <main class="main" id="view"></main>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* =========================================================
   STORE  —  all state persists in localStorage (file-local)
   ========================================================= */
const KEY = "learning-console:v1";
const DEFAULT = {
  domains: [],      // {id,name,level,phase,createdAt,diag:{q1,q2,q3}, schedule:[...] }
  sessions: [],     // {id,dateISO,domainId,domainName,goal,icap,tracePct,gaps,questions,integration,nextISO}
  errors: [],       // {id,dateISO,error,moment,assumption,actual,ifFalse}
  exposures: [],    // {id,dateISO,situation,before,predicted,happened,after}
  reviews: [],      // weekly: {id,dateISO,met,best,worst,outside,slept,change}
  ui: { activeDomain: null }
};
let DB = load();
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return structuredClone(DEFAULT);
    const parsed = JSON.parse(raw);
    return Object.assign(structuredClone(DEFAULT), parsed);
  }catch(e){ console.warn("load failed",e); return structuredClone(DEFAULT); }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(DB)); }
  catch(e){ toast("Could not save (storage blocked). Export your data to be safe.", false); }
}
const uid = () => Math.random().toString(36).slice(2,9);

/* =========================================================
   UTIL
   ========================================================= */
const $  = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const DAY = 86400000;
function today0(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function iso(d){ return new Date(d).toISOString(); }
function fmtDate(isoStr){ if(!isoStr) return "—"; const d=new Date(isoStr); return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); }
function fmtShort(isoStr){ if(!isoStr) return "—"; return new Date(isoStr).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/DAY); }
function daysFromNow(isoStr){ if(!isoStr) return null; return Math.round((new Date(isoStr)-today0())/DAY); }
function addDays(days,from=new Date()){ const d=new Date(from); d.setHours(0,0,0,0); d.setDate(d.getDate()+Math.round(days)); return d; }
function relDue(isoStr){
  const n = daysFromNow(isoStr);
  if(n===null) return "—";
  if(n<0) return `${Math.abs(n)}d overdue`;
  if(n===0) return "due today";
  if(n===1) return "tomorrow";
  return `in ${n}d`;
}
let toastTimer;
function toast(msg, ok=true){
  const t=$("#toast"); t.textContent=msg; t.className="toast show"+(ok?" ok":"");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className="toast",2600);
}
const CHECK_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="#04070a" stroke-width="3.5"><path d="M4 12l6 6L20 6"/></svg>';

function levelToPhase(level){ return level==="novice"?"Phase 1–2":level==="intermediate"?"Phase 3–4":"Phase 5"; }
function activeDomain(){ return DB.domains.find(d=>d.id===DB.ui.activeDomain) || DB.domains[0] || null; }

/* Spacing engine — a transparent interpretation of the guide's two
   overlapping schemes (24h recovery table + standard interval ladder).
   Stages map to the guide's "Day0 → +1-2 → +4-5 → +10-12 → +21-25 → +45-50". */
const STAGE_DAYS = [2,5,11,23,47,47];
function computeNext(recall, stage){
  // returns {days, nextStage, band, reason}
  let s = stage||0, days, band, reason, nextStage;
  if(recall < 50){
    days = 1; nextStage = Math.max(0, s-1); band="insufficient";
    reason = "<50% — insufficient trace. Concentrated session tomorrow; don't space yet.";
  } else if(recall < 70){
    days = 2; nextStage = s; band="sufficient";
    reason = "50–70% — sufficient trace. Short interval, stage held.";
  } else if(recall < 90){
    nextStage = Math.min(STAGE_DAYS.length-1, s+1);
    days = STAGE_DAYS[nextStage]; band="strong";
    reason = "≥70% — strong trace. Advance to next standard interval.";
  } else {
    nextStage = Math.min(STAGE_DAYS.length-1, s+1);
    days = Math.round(STAGE_DAYS[nextStage]*1.3); band="mastered";
    reason = "≥90% — lengthen beyond the standard interval.";
  }
  return {days, nextStage, band, reason};
}
/* =========================================================
   ICONS (inline)
   ========================================================= */
const IC = {
  console:'<path d="M3 3h18v13H3z"/><path d="M8 21h8M12 16v5"/>',
  diagnose:'<path d="M12 3v6M12 15v6M3 12h6M15 12h6"/><circle cx="12" cy="12" r="3"/>',
  strategies:'<path d="M4 19V5M4 5l7 4-7 4M20 5v14M20 5l-7 4 7 4"/>',
  session:'<circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/>',
  spacing:'<path d="M3 17c4 0 4-10 8-10s4 10 8 10"/><circle cx="3" cy="17" r="1.5"/><circle cx="19" cy="17" r="1.5"/>',
  transitions:'<path d="M5 12h14M13 6l6 6-6 6"/>',
  troubleshoot:'<path d="M14 6l-8 8-3 3 3-3 8-8 2-2-2 2z"/><circle cx="18" cy="6" r="3"/>',
  toolbox:'<path d="M3 8h18v11H3zM8 8V5h8v3"/>',
  review:'<path d="M9 11l3 3 8-8M20 12v7H4V5h11"/>',
  logs:'<path d="M4 4h16v16H4zM8 9h8M8 13h8M8 17h5"/>',
  reference:'<path d="M4 5a2 2 0 012-2h12v18H6a2 2 0 01-2-2z"/><path d="M8 7h6"/>'
};
/* Stratum numbers are a fixed depth coordinate per section — not decoration.
   The same section always reads the same depth, so the number is a real
   address you can use to say "meet me at LV.027" and mean Spacing. */
const NAV = [
  {group:"Run"},
  {id:"console",   label:"Console",       ic:IC.console,      lv:"000"},
  {id:"session",   label:"Session",       ic:IC.session,      lv:"014"},
  {id:"spacing",   label:"Spacing",       ic:IC.spacing,      lv:"027"},
  {group:"Decide"},
  {id:"diagnose",  label:"Diagnose level",ic:IC.diagnose,     lv:"041"},
  {id:"strategies",label:"Strategies",    ic:IC.strategies,   lv:"052"},
  {id:"transitions",label:"Am I ready?",  ic:IC.transitions,  lv:"066"},
  {id:"troubleshoot",label:"Troubleshoot",ic:IC.troubleshoot, lv:"078"},
  {group:"Sustain"},
  {id:"toolbox",   label:"Toolbox",       ic:IC.toolbox,      lv:"083"},
  {id:"review",    label:"Weekly review", ic:IC.review,       lv:"091"},
  {id:"logs",      label:"Logs & templates",ic:IC.logs,       lv:"104"},
  {id:"reference", label:"Principles",    ic:IC.reference,    lv:"-01"},
];

/* =========================================================
   ROUTER
   ========================================================= */
const Views = {};
let ROUTE = "console";
function dueCount(){
  const t = today0();
  let n=0;
  DB.domains.forEach(d=>(d.schedule||[]).forEach(s=>{ if(s.nextISO && new Date(s.nextISO) <= new Date(t.getTime()+DAY-1)) n++; }));
  return n;
}
function renderNav(){
  const nav=$("#nav"); nav.innerHTML="";
  NAV.forEach(item=>{
    if(item.group){ const l=document.createElement("div"); l.className="nav-label"; l.textContent=item.group; nav.appendChild(l); return; }
    const el=document.createElement("div");
    el.className="nav-item"+(ROUTE===item.id?" active":"");
    let badge="";
    if(item.id==="spacing"||item.id==="console"){ const dc=dueCount(); if(dc>0) badge=`<span class="badge">${dc}</span>`; }
    const lv=badge?"":`<span class="nav-lv">LV.${item.lv}</span>`;
    el.innerHTML=`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${item.ic}</svg><span>${item.label}</span>${badge}${lv}`;
    el.onclick=()=>{ go(item.id); closeMenu(); };
    nav.appendChild(el);
  });
  const cur=NAV.find(x=>x.id===ROUTE);
  const stratum=$("#stratum");
  if(stratum) stratum.textContent = cur ? `STRATUM LV.${cur.lv}` : "";
}
function go(route){ ROUTE=route; window.scrollTo(0,0); render(); }
function render(){
  renderNav();
  const v=$("#view");
  v.innerHTML = (Views[ROUTE]||Views.console)();
  // run any post-render binder the view attached
  if(typeof v._after==="function"){ const f=v._after; v._after=null; f(); }
}
function after(fn){ $("#view")._after = fn; }

/* mobile menu */
function openMenu(){ $("#sidebar").classList.add("open"); $("#scrim").classList.add("show"); }
function closeMenu(){ $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("show"); }
/* =========================================================
   SIGNATURE — retention (forgetting) curve as SVG
   A trace decays after each contact, then is re-strengthened
   at the next spaced contact; stability grows each time so
   the intervals can lengthen. This is the science the
   spacing scheduler runs on, drawn literally.
   ========================================================= */
function curveSVG(contacts, opts={}){
  // contacts: array of {day, label} cumulative day offsets. If empty, use ideal.
  const W=600,H=190,padL=8,padR=8,padT=14,padB=26;
  const ideal=[0,2,7,18,41,88];
  const cs = (contacts&&contacts.length)?contacts.map(c=>c.day):ideal;
  const maxDay = Math.max(cs[cs.length-1]+ (cs.length>1?(cs[cs.length-1]-cs[cs.length-2]):20), 20);
  const x = d => padL + (d/maxDay)*(W-padL-padR);
  const y = r => padT + (1-r)*(H-padT-padB);
  // stability grows per contact
  let path="", area="", dots="";
  for(let i=0;i<cs.length;i++){
    const start=cs[i];
    const end=(i<cs.length-1)?cs[i+1]:maxDay;
    const stability = 2 + i*3.2;              // grows -> slower decay each contact
    let seg = (i===0?`M ${x(start).toFixed(1)} ${y(1).toFixed(1)}`:`L ${x(start).toFixed(1)} ${y(1).toFixed(1)}`);
    const steps=18;
    for(let k=1;k<=steps;k++){
      const t=start+(end-start)*(k/steps);
      const r=Math.exp(-(t-start)/stability);
      seg+=` L ${x(t).toFixed(1)} ${y(r).toFixed(1)}`;
    }
    path+=seg+" ";
    dots+=`<circle cx="${x(start).toFixed(1)}" cy="${y(1).toFixed(1)}" r="3.4" fill="#8fe6f0"/>`;
  }
  area = path + ` L ${x(maxDay).toFixed(1)} ${y(0).toFixed(1)} L ${x(0).toFixed(1)} ${y(0).toFixed(1)} Z`;
  const thr = y(0.5);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block;max-height:190px">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fe6f0" stop-opacity=".16"/>
      <stop offset="1" stop-color="#8fe6f0" stop-opacity="0"/></linearGradient></defs>
    <line x1="${padL}" y1="${thr}" x2="${W-padR}" y2="${thr}" stroke="#b98a3a" stroke-width="1" stroke-dasharray="4 4" opacity=".55"/>
    <text x="${W-padR}" y="${thr-5}" text-anchor="end" font-family="IBM Plex Mono" font-size="9" fill="#b98a3a" opacity=".85">~50% retrieval floor</text>
    <path d="${area}" fill="url(#cg)"/>
    <path d="${path}" fill="none" stroke="#8fe6f0" stroke-width="1.6" stroke-linejoin="round"/>
    ${dots}
    <text x="${padL}" y="${H-8}" font-family="IBM Plex Mono" font-size="9" fill="#4d5257">contact 1</text>
    <text x="${W-padR}" y="${H-8}" text-anchor="end" font-family="IBM Plex Mono" font-size="9" fill="#4d5257">time →</text>
  </svg>`;
}

/* domain selector chip row */
function domainSelector(onchangeName){
  if(!DB.domains.length) return "";
  const a=activeDomain();
  return `<div class="row" style="margin-bottom:18px">
    <span class="tag">domain</span>
    ${DB.domains.map(d=>`<button class="btn sm ${d.id===a.id?'primary':'ghost'}" data-dom="${d.id}">${esc(d.name)}</button>`).join("")}
  </div>`;
}
function bindDomainSelector(){
  $$("[data-dom]").forEach(b=>b.onclick=()=>{ DB.ui.activeDomain=b.dataset.dom; save(); render(); });
}

/* =========================================================
   VIEW: CONSOLE
   ========================================================= */
Views.console = function(){
  const dc=dueCount();
  const doms=DB.domains;
  const a=activeDomain();
  // build due list
  let due=[];
  doms.forEach(d=>(d.schedule||[]).forEach(s=>{ if(s.nextISO) due.push({dom:d,s}); }));
  due.sort((x,y)=>new Date(x.s.nextISO)-new Date(y.s.nextISO));
  const dueSoon=due.filter(x=>daysFromNow(x.s.nextISO)<=0);

  const contacts = a ? buildContacts(a) : null;

  const gap=gapDays();
  let html=`
  <div class="eyebrow">Operating console</div>
  <h1 class="page-title">${greeting()}</h1>
  <p class="page-intro">Your standing view: what memory is decaying, what to run next, and where each domain sits. The only valid signal is producing knowledge without help — not time spent, not familiarity.</p>
  ${gap>=10?`<div class="card" style="border-color:rgba(185,138,58,.5);margin-bottom:20px">
    <div class="eyebrow" style="color:var(--consolidate)">Re-entry protocol</div>
    <h3 style="font-size:18px;margin-bottom:8px">It's been ${gap} days. That's fine — here's the way back in.</h3>
    <p style="font-size:14px;color:var(--muted);margin:0 0 6px">Don't try to recover lost time; return at normal volume. The overdue list below is information, not debt. Test where you <b style="color:var(--text)">are now</b> — not where you were — re-enter one phase below where you left off, and make the first session back ridiculously small: its only job is breaking inertia.</p>
    <div class="row" style="margin-top:12px">
      <button class="btn warm sm" onclick="go('diagnose')">Re-diagnose where I am</button>
      <button class="btn sm" onclick="go('session')">Start a tiny session</button>
    </div>
  </div>`:""}

  <div class="grid grid-2">
    <div class="card">
      <div class="spread" style="margin-bottom:6px">
        <h3 style="font-size:16px">Retention trace</h3>
        ${a?`<span class="tag">${esc(a.name)}</span>`:`<span class="tag">idealized</span>`}
      </div>
      <div class="curve-wrap">${curveSVG(contacts)}</div>
      <p class="hint">Each teal dot is a contact; the trace decays between them. Space contacts so each lands near the retrieval floor — recalling from a weak trace is what strengthens it.</p>
    </div>
    <div class="stack">
      <div class="card">
        <div class="stat"><span class="num" style="color:var(--consolidate)">${dc}</span><span class="lab">reviews due today</span></div>
        <div style="margin-top:14px" class="row">
          <button class="btn primary sm" onclick="go('session')">Start a session</button>
          <button class="btn warm sm" onclick="go('spacing')">Log a review</button>
        </div>
      </div>
      <div class="card">
        <div class="stat"><span class="num">${DB.sessions.length}</span><span class="lab">sessions logged</span></div>
        <div class="row" style="margin-top:14px">
          <div class="stat" style="flex:1"><span class="num" style="font-size:20px">${doms.length}</span><span class="lab">domains</span></div>
          <div class="stat" style="flex:1"><span class="num" style="font-size:20px">${lastTrace()}</span><span class="lab">last trace</span></div>
        </div>
      </div>
    </div>
  </div>`;

  // due list
  html+=`<div class="section-title">Due now<span class="rule"></span></div>`;
  if(dueSoon.length){
    html+=`<div class="card" style="padding:6px"><table class="tbl"><thead><tr><th>Concept</th><th>Domain</th><th>Due</th><th>Last recall</th><th></th></tr></thead><tbody>`;
    dueSoon.forEach(({dom,s})=>{
      html+=`<tr>
        <td>${esc(s.concept)}</td>
        <td><span class="tag">${esc(dom.name)}</span></td>

  }

};
function greeting(){ const h=new Date().getHours(); const t=h<12?"Good morning":h<18?"Good afternoon":"Good evening"; return t+"."; }
function lastActivityISO(){
  let last=null;
  const bump=d=>{ if(d && (!last || new Date(d)>new Date(last))) last=d; };
  DB.sessions.forEach(s=>bump(s.dateISO));
  DB.domains.forEach(d=>(d.schedule||[]).forEach(s=>(s.history||[]).forEach(h=>bump(h.date))));
  DB.reviews.forEach(r=>bump(r.dateISO));
  return last;
}
function gapDays(){
  const last=lastActivityISO();
  if(!last) return 0;
  return Math.max(0, daysBetween(last, new Date()));
}
function lastTrace(){ if(!DB.sessions.length) return "—"; const s=[...DB.sessions].sort((a,b)=>new Date(b.dateISO)-new Date(a.dateISO))[0]; return s.tracePct!=null?s.tracePct+"%":"—"; }
function buildContacts(dom){
  // aggregate contacts from the most-developed concept's history
  let best=null;
  (dom.schedule||[]).forEach(s=>{ const h=(s.history||[]); if(!best||h.length>best.length) best=h; });
  if(!best||!best.length) return null;
  let cum=0; const out=[{day:0}];
  for(let i=1;i<best.length;i++){ cum+=best[i].interval||STAGE_DAYS[Math.min(i,STAGE_DAYS.length-1)]; out.push({day:cum}); }
  return out.length>1?out:null;
}
/* =========================================================

function modal(inner, onmount){
  closeModal();

  wrap.id="modal";
  wrap.style.cssText="position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:18px;background:rgba(2,2,3,.72);backdrop-filter:blur(2px)";

  document.body.appendChild(wrap);
  if(onmount) onmount(wrap);
}
function closeModal(){ const m=$("#modal"); if(m) m.remove(); }

/* Log a recall for a scheduled concept -> applies spacing engine */
function openReview(domId, sId){
  const dom=DB.domains.find(d=>d.id===domId); if(!dom) return;
  const s=(dom.schedule||[]).find(x=>x.id===sId); if(!s) return;
  modal(`
    <div class="eyebrow">Log recall</div>
    <h3 style="font-size:20px;margin-bottom:4px">${esc(s.concept)}</h3>

      <div class="rangebox"><input type="range" id="rc" min="0" max="100" step="5" value="${s.lastRecall??60}"><span class="rangeval" id="rcv">${s.lastRecall??60}%</span></div>
      <p class="hint">Score the blank-page attempt, not how familiar it felt on re-reading.</p>
    </label>
    <div id="reason" class="callout" style="margin:6px 0 18px"></div>
    <div class="row" style="justify-content:flex-end">
      <button class="btn ghost" id="mcancel">Cancel</button>

    </div>
  `,(w)=>{
    const rc=$("#rc",w),rcv=$("#rcv",w),reason=$("#reason",w);

      const v=+rc.value; rcv.textContent=v+"%";

      const next=addDays(c.days);
      reason.className="callout"+(c.band==="insufficient"?" alert":c.band==="strong"||c.band==="mastered"?" cool":"");
      reason.innerHTML=`<strong>Next contact: ${fmtDate(next)}</strong> <span class="tag">+${c.days}d</span><br><span class="hint">${c.reason}</span>`;
    }
    rc.oninput=upd; upd();

}

/* ---- export scheduled contacts as an iCalendar file ---- */
function exportICS(){
  const rows=[];
  DB.domains.forEach(d=>(d.schedule||[]).forEach(s=>{ if(s.nextISO) rows.push({d,s}); }));
  if(!rows.length){ toast("Nothing scheduled to export."); return; }
  const day=x=>new Date(x).toISOString().slice(0,10).replace(/-/g,"");
  const stamp=new Date().toISOString().replace(/[-:]/g,"").slice(0,15)+"Z";
  const escT=t=>String(t).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
  let ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Learning Console//EN\r\nCALSCALE:GREGORIAN\r\n";
  rows.forEach(({d,s})=>{
    ics+="BEGIN:VEVENT\r\n"
      +"UID:"+s.id+"-"+day(s.nextISO)+"@learning-console\r\n"
      +"DTSTAMP:"+stamp+"\r\n"
      +"DTSTART;VALUE=DATE:"+day(s.nextISO)+"\r\n"
      +"SUMMARY:"+escT("Recall: "+s.concept)+"\r\n"
      +"DESCRIPTION:"+escT("Domain: "+d.name+". Blank-page recall first, then log the % in Learning Console.")+"\r\n"
      +"END:VEVENT\r\n";
  });
  ics+="END:VCALENDAR\r\n";
  const blob=new Blob([ics],{type:"text/calendar"});
  const url=URL.createObjectURL(blob); const aEl=document.createElement("a");
  aEl.href=url; aEl.download="learning-console-reviews.ics"; aEl.click();
  URL.revokeObjectURL(url);
  toast(rows.length+" review"+(rows.length===1?"":"s")+" exported — import the file into your calendar");
}

/* =========================================================

let WT={id:null,dur:1800,remaining:1800,running:false};
function clearWT(){ if(WT.id){clearInterval(WT.id);WT.id=null;} WT.running=false; }
function wtPaint(){
  const c=$("#wt-clock"); if(!c) return;
  c.textContent=fmtClock(WT.remaining);
  $("#wt-toggle").textContent=WT.running?"Pause":"Start";
  $("#wt-fill").style.width=(100*(1-WT.remaining/WT.dur))+"%";
}
function wtTick(){
  WT.remaining--;
  if(WT.remaining<=0){ clearWT(); WT.remaining=0; toast("Block done — run the closing ritual."); }
  wtPaint();
}
function wtToggle(){
  if(WT.running){ clearWT(); }
  else { if(WT.remaining<=0) WT.remaining=WT.dur; WT.running=true; WT.id=setInterval(wtTick,1000); }
  wtPaint();
}
function wtSet(min){

/* =========================================================
   SESSION TIMER (updates its own DOM, never re-renders view)
   ========================================================= */
const RITUAL = [
  {t:600, title:"Consolidation wait (optional)", desc:"Material closed. Do something unrelated — no rehearsing. Short on time? Skip with Next."},
  {t:300, title:"Minimum trace test", desc:"Material stays closed. Type everything you remember into the write-up box below."},
  {t:180, title:"Identify gaps", desc:"Now open the material. Compare it against your write-up and record what was missing in Gaps."},
  {t:180, title:"Open questions", desc:"Write 1–3 specific questions you still can't answer."},
  {t:120, title:"Schedule next contact", desc:"Set the next contact from your trace-test result."},
  {t:120, title:"Integration sentence", desc:"One sentence connecting today to the bigger map."},
];
let TIMER={id:null,step:0,remaining:RITUAL[0].t,running:false};
function clearTimer(){ if(TIMER.id){clearInterval(TIMER.id);TIMER.id=null;} TIMER.running=false; }
function fmtClock(s){ const m=Math.floor(s/60),ss=s%60; return `${m}:${String(ss).padStart(2,"0")}`; }
function paintTimer(){
  const d=$("#tmr-clock"); if(!d) return;
  d.textContent=fmtClock(TIMER.remaining);
  const st=RITUAL[TIMER.step];
  $("#tmr-title").textContent=`${TIMER.step+1}/${RITUAL.length} · ${st.title}`;
  $("#tmr-desc").textContent=st.desc;
  const pct=100*(1-TIMER.remaining/st.t);
  $("#tmr-fill").style.width=pct+"%";
  $("#tmr-toggle").textContent=TIMER.running?"Pause":"Start";
}
function timerTick(){
  TIMER.remaining--;
  if(TIMER.remaining<=0){
    clearInterval(TIMER.id); TIMER.id=null; TIMER.running=false;
    toast(`Done: ${RITUAL[TIMER.step].title}`);
    if(TIMER.step<RITUAL.length-1){ TIMER.step++; TIMER.remaining=RITUAL[TIMER.step].t; }
    else { TIMER.remaining=0; }
    paintTimer(); return;
  }
  paintTimer();
}
function timerToggle(){
  if(TIMER.running){ clearInterval(TIMER.id); TIMER.id=null; TIMER.running=false; }
  else { if(TIMER.remaining<=0) TIMER.remaining=RITUAL[TIMER.step].t; TIMER.running=true; TIMER.id=setInterval(timerTick,1000); }
  paintTimer();
}
function timerStep(dir){
  clearTimer();
  TIMER.step=Math.max(0,Math.min(RITUAL.length-1,TIMER.step+dir));
  TIMER.remaining=RITUAL[TIMER.step].t; paintTimer();
}
function timerReset(){ clearTimer(); TIMER.remaining=RITUAL[TIMER.step].t; paintTimer(); }

    // inputs
    $("#s-dom").onchange=e=>{ dr.domainId=e.target.value; save(); };
    $("#s-goal").oninput=e=>{ dr.goal=e.target.value; save(); };
    $("#s-icap").onchange=e=>{ dr.icap=e.target.value; save(); };
    const tr=$("#s-trace"),trv=$("#s-tracev"),trh=$("#s-tracehint");
    function trhint(){ const v=+tr.value; trv.textContent=v+"%"; dr.tracePct=v; save();
      const c=computeNext(v,0);
      trh.innerHTML = v<50?`<span style="color:var(--alert)">Insufficient — another concentrated session tomorrow.</span>`
        : v<70?`<span style="color:var(--consolidate)">Sufficient — review in ~2 days.</span>`
        : `<span style="color:var(--retrieve)">Strong — you can space this ${c.days} days out.</span>`; }
    tr.oninput=trhint; trhint();
    $("#s-writeup").oninput=e=>{dr.writeup=e.target.value;save();};
    $("#s-gaps").oninput=e=>{dr.gaps=e.target.value;save();};
    $("#s-q").oninput=e=>{dr.questions=e.target.value;save();};
    $("#s-int").oninput=e=>{dr.integration=e.target.value;save();};
    // timers
    $("#wt-toggle").onclick=wtToggle;
    $$("[data-wt]").forEach(b=>b.onclick=()=>wtSet(+b.dataset.wt));
    wtPaint();
    $("#tmr-toggle").onclick=timerToggle;
    $("#tmr-prev").onclick=()=>timerStep(-1);
    $("#tmr-next").onclick=()=>timerStep(1);
    $("#tmr-reset").onclick=timerReset;
    paintTimer();
    // save / discard
    $("#s-save").onclick=saveSession;
    $("#s-discard").onclick=()=>{ if(confirm("Discard this session draft?")){ DB.ui.draft=null; save(); toast("Draft discarded"); render(); } };
  });
  return html;
};
function makeCheck(bucket,k,label){
  const dr=draft(); const on=!!dr[bucket][k];
  const el=document.createElement("div");
  el.className="check"+(on?" on":"");
  el.innerHTML=`<span class="box">${CHECK_SVG}</span><span class="txt">${esc(label)}</span>`;
  el.onclick=()=>{ dr[bucket][k]=!dr[bucket][k]; el.classList.toggle("on",dr[bucket][k]); save(); };
  return el;
}
function saveSession(){
  const dr=draft();
  const dom=DB.domains.find(d=>d.id===dr.domainId);
  const rec={id:uid(),dateISO:iso(new Date()),domainId:dr.domainId,domainName:dom?dom.name:"—",
    goal:dr.goal,icap:dr.icap,tracePct:dr.tracePct,writeup:dr.writeup,gaps:dr.gaps,questions:dr.questions,integration:dr.integration};
  DB.sessions.unshift(rec);
  DB.ui.draft=null; save(); clearTimer(); clearWT();

  // offer to add the goal as a scheduled concept
  if(dom && dr.goal.trim()){
    modal(`<div class="eyebrow">Bank the trace</div>
      <h3 style="font-size:19px;margin-bottom:10px">Schedule this for spaced recall?</h3>
      <p class="hint" style="margin-bottom:16px">Add today's focus to the scheduler at ${dr.tracePct}% so it comes back before it fades.</p>
      <label class="field"><span>Concept</span><input type="text" id="cc" value="${esc(dr.goal)}"></label>

        save(); closeModal(); toast("Added to scheduler"); render(); };

}

Views.diagnose = function(){

  if(DB.domains.length){
    html+=`<div class="section-title">Existing domains<span class="rule"></span></div><div class="grid grid-3">`;
    DB.domains.forEach(d=>{ html+=`<div class="card"><div class="spread"><h3 style="font-size:15px">${esc(d.name)}</h3><span class="pill ${d.level}">${d.level}</span></div><p class="hint" style="margin-top:6px">${levelToPhase(d.level)}</p><button class="btn sm ghost" style="margin-top:10px" data-red="${d.id}">Re-diagnose</button></div>`; });
    html+=`</div>`;
  }

  after(()=>{
    const state={q:[null,null,null]};
    const qs=$("#d-qs");
    DIAG_Q.forEach((q,i)=>{
      const row=document.createElement("div"); row.style.cssText="margin:12px 0";
      row.innerHTML=`<div style="font-size:14px;margin-bottom:8px">${i+1}. ${q}</div>
        <div class="row"><button class="btn sm" data-yes="${i}">Yes</button><button class="btn sm" data-no="${i}">No</button></div>`;
      qs.appendChild(row);
    });
    function refresh(){
      $$("[data-yes]").forEach(b=>{const i=+b.dataset.yes;b.classList.toggle("primary",state.q[i]===true);});
      $$("[data-no]").forEach(b=>{const i=+b.dataset.no;b.classList.toggle("warm",state.q[i]===false);});
      const done=state.q.every(v=>v!==null) && $("#d-name").value.trim();
      $("#d-save").disabled=!done;
      if(state.q.every(v=>v!==null)){
        const yes=state.q.filter(Boolean).length;
        const level=yes===0?"novice":yes<3?"intermediate":"advanced";
        $("#d-result").innerHTML=`<div class="callout cool"><strong>${yes}/3 yes → <span class="pill ${level}" style="vertical-align:middle">${level}</span></strong> · use ${levelToPhase(level)} strategies. <a href="#" id="tostrat">See what to do →</a></div>`;
        state.level=level;
        const ts=$("#tostrat"); if(ts) ts.onclick=e=>{e.preventDefault();go('strategies');};
      }
    }
    $("#d-name").oninput=refresh;
    $$("[data-yes]").forEach(b=>b.onclick=()=>{state.q[+b.dataset.yes]=true;refresh();});
    $$("[data-no]").forEach(b=>b.onclick=()=>{state.q[+b.dataset.no]=false;refresh();});
    $("#d-save").onclick=()=>{
      const name=$("#d-name").value.trim(); const yes=state.q.filter(Boolean).length;
      const level=yes===0?"novice":yes<3?"intermediate":"advanced";
      const existing=DB.domains.find(d=>d.name.toLowerCase()===name.toLowerCase());
      if(existing){ existing.level=level; existing.diag={q1:state.q[0],q2:state.q[1],q3:state.q[2]}; }
      else { DB.domains.push({id:uid(),name,level,createdAt:iso(new Date()),diag:{q1:state.q[0],q2:state.q[1],q3:state.q[2]},schedule:[]}); }
      DB.ui.activeDomain=(existing||DB.domains[DB.domains.length-1]).id;
      save(); toast(`${name} → ${level}`); go('strategies');
    };
    $$("[data-red]").forEach(b=>b.onclick=()=>{ const d=DB.domains.find(x=>x.id===b.dataset.red); $("#d-name").value=d.name; refresh(); $("#d-name").scrollIntoView({behavior:"smooth"}); });
    refresh();
  });
  return html;
};

const TRANS=[
  {from:"Direct instruction",to:"Spaced practice",test:"Recall at 24h without reviewing.",pass:"≥50% of main concepts."},
  {from:"Blocked practice",to:"Active retrieval",test:"Blank page for 10 min.",pass:"General structure emerges on its own."},
  {from:"Retrieval",to:"Interleaving",test:"10 problems per category, blocked.",pass:"≥8/10 per category + can articulate the differences + classify a new problem in <10 sec."},
  {from:"Elaboration",to:"Productive failure",test:"Attempt a multi-concept problem for 10 min.",pass:"A partial (incorrect) solution with correct elements + you can name where your logic breaks."},
  {from:"Constructive",to:"Interactive",test:"Write your position + the best objection to it.",pass:"Both are reasoned and based on domain content, not preferences."},
];
/* ---- gate state helpers (per domain) ---- */
function domGates(d){ d.gates=d.gates||{}; return d.gates; }
function domCats(d){ d.cats=d.cats||[]; return d.cats; }
function gatesPassed(d){ if(!d) return 0; const g=d.gates||{}; return TRANS.reduce((n,_,i)=>n+((g[i]&&g[i].passed)?1:0),0); }
function catMeets(c){ return c.attempts>=10 && c.correct/c.attempts>=0.8; }
function interleaveReady(d){ const cs=domCats(d); return cs.length>=2 && cs.every(catMeets); }
function advanceTarget(d){
  if(!d) return null;
  const g=d.gates||{};
  if(d.level==="novice" && g[0]&&g[0].passed) return "intermediate";
  if(d.level==="intermediate" && g[3]&&g[3].passed && g[4]&&g[4].passed) return "advanced";
  return null;
}

  let html=`<div class="eyebrow">Cognitive load · recovery</div><h1 class="page-title">Toolbox</h1>
  <p class="page-intro">These sit underneath every strategy. Their whole job is to keep you below your working-memory limit so the strategy can actually run.</p>

  <div class="section-title">Cognitive load tools<span class="rule"></span></div>
  <div class="card" style="padding:6px"><table class="tbl"><thead><tr><th>Tool</th><th>When to use it</th></tr></thead><tbody>
  ${LOAD_TOOLS.map(([t,w])=>`<tr><td style="font-weight:600;color:var(--retrieve);white-space:nowrap">${esc(t)}</td><td>${esc(w)}</td></tr>`).join("")}
  </tbody></table></div>

  <div class="section-title">Sleep protocol · non-negotiable<span class="rule"></span></div>
  <div class="grid grid-2">
    <div class="card"><p class="hint" style="margin-bottom:12px">Sleep is an active practice session, not stolen study time. Consolidation happens here.</p><div id="sleeplist"></div></div>
    <div class="card" style="display:grid;place-items:center;text-align:center">
      <div><div class="mono" style="font-size:28px;color:var(--consolidate)">4h study + 8h sleep</div>
      <div class="mono" style="color:var(--faint);margin:6px 0">&gt;</div>
      <div class="mono" style="font-size:28px;color:var(--muted)">8h study + 4h sleep</div>
      <p class="hint" style="margin-top:14px">Cutting sleep to study is a net loss. The trace never consolidates.</p></div>
    </div>
  </div>`;
  after(()=>{
    const sl=$("#sleeplist");
    DB.ui.sleep=DB.ui.sleep||{};
    SLEEP.forEach((s,i)=>{
      const on=!!DB.ui.sleep[i];
      const el=document.createElement("div"); el.className="check"+(on?" on":"");
      el.innerHTML=`<span class="box">${CHECK_SVG}</span><span class="txt">${esc(s)}</span>`;
      el.onclick=()=>{ DB.ui.sleep[i]=!DB.ui.sleep[i]; el.classList.toggle("on",DB.ui.sleep[i]); save(); };
      sl.appendChild(el);
    });
  });
  return html;
};
/* =========================================================
   VIEW: WEEKLY REVIEW  (+ re-entry protocol)
   ========================================================= */
Views.review = function(){
  let html=`<div class="eyebrow">Sunday · 15 min</div><h1 class="page-title">Weekly review</h1>
  <p class="page-intro">A short audit that catches phase-drift and sleep debt before they cost you a week. Answer honestly — this is the one place the system corrects itself.</p>
  <div class="card">
    <label class="field"><span>1 · Do I meet the exit criteria for my current phase?</span>
      ${activeDomain()?`<p class="hint" style="margin-bottom:8px">Evidence for ${esc(activeDomain().name)}: <b class="mono">${gatesPassed(activeDomain())}/${TRANS.length}</b> gates passed · <a href="#" onclick="go('transitions');return false">run the gates →</a></p>`:""}
      <div class="row"><button class="btn sm" data-met="yes">Yes → advance</button><button class="btn sm" data-met="no">Not yet</button></div></label>
    <label class="field"><span>2 · Which strategy worked best this week — and why?</span><textarea id="r-best"></textarea></label>
    <label class="field"><span>…and which worked worst — and why?</span><textarea id="r-worst"></textarea></label>
    <label class="field"><span>3 · Did I apply any strategy outside its activation condition?</span><textarea id="r-outside" placeholder="e.g. interleaved before hitting 8/10 blocked"></textarea></label>
    <label class="field"><span>4 · Did I sleep ≥7h consistently?</span>
      <div class="row"><button class="btn sm" data-slept="yes">Yes</button><button class="btn sm" data-slept="no">No → priority #1</button></div></label>
    <label class="field"><span>5 · One thing I'll change next week</span><input type="text" id="r-change"></label>
    <div class="row" style="justify-content:flex-end"><button class="btn primary" id="r-save">Save review</button></div>
  </div>

  <div class="section-title">Re-entry protocol · after falling off<span class="rule"></span></div>
  <div class="grid grid-2">
    <div class="card"><span class="tag">1</span><p style="margin-top:8px;font-size:14px">Don't try to recover lost time. Return to normal volume, not a punishing catch-up.</p></div>
    <div class="card"><span class="tag">2</span><p style="margin-top:8px;font-size:14px">Test where you ARE now, not where you were. Re-diagnose.</p></div>
    <div class="card"><span class="tag">3</span><p style="margin-top:8px;font-size:14px">Re-enter one phase below where you left off, for one session.</p></div>
    <div class="card"><span class="tag">4</span><p style="margin-top:8px;font-size:14px">First session back is ridiculously small — the only goal is breaking inertia.</p></div>
  </div>`;

  if(DB.reviews.length){
    html+=`<div class="section-title">Past reviews<span class="rule"></span></div><div class="card" style="padding:6px"><table class="tbl"><thead><tr><th>Date</th><th>Met criteria</th><th>Slept ≥7h</th><th>Changing</th></tr></thead><tbody>`;
    DB.reviews.slice(0,8).forEach(r=>html+=`<tr><td class="mono">${fmtShort(r.dateISO)}</td><td>${r.met==="yes"?'<span class="pill ok">yes</span>':'<span class="tag">no</span>'}</td><td>${r.slept==="yes"?'yes':'<span style="color:var(--alert)">no</span>'}</td><td>${esc(r.change||"—")}</td></tr>`);
    html+=`</tbody></table></div>`;
  }

  after(()=>{
    const st={met:null,slept:null};
    $$("[data-met]").forEach(b=>b.onclick=()=>{st.met=b.dataset.met;$$("[data-met]").forEach(x=>x.classList.toggle("primary",x===b));});
    $$("[data-slept]").forEach(b=>b.onclick=()=>{st.slept=b.dataset.slept;$$("[data-slept]").forEach(x=>x.classList.toggle("primary",x===b));});
    $("#r-save").onclick=()=>{
      DB.reviews.unshift({id:uid(),dateISO:iso(new Date()),met:st.met,slept:st.slept,best:$("#r-best").value,worst:$("#r-worst").value,outside:$("#r-outside").value,change:$("#r-change").value});
      save(); toast("Review saved"); render();
    };
  });
  return html;
};

/* =========================================================
   VIEW: LOGS & TEMPLATES
   ========================================================= */
Views.logs = function(){
  let html=`<div class="eyebrow">Instruments</div><h1 class="page-title">Logs & templates</h1>
  <p class="page-intro">The written record is the point. A trace you can't reproduce on paper isn't yours yet, and a mistake you don't write down repeats.</p>`;

  // Session log history
  html+=`<div class="section-title">Session log<span class="rule"></span><button class="btn sm ghost" onclick="go('session')">+ New session</button></div>`;
  if(DB.sessions.length){
    html+=`<div class="stack">`;
    DB.sessions.slice(0,12).forEach(s=>{
      html+=`<div class="card">
        <div class="spread"><div class="row" style="gap:8px"><span class="mono" style="color:var(--faint)">${fmtDate(s.dateISO)}</span>${s.domainName!=="—"?`<span class="tag">${esc(s.domainName)}</span>`:""}${s.icap?`<span class="tag">${esc(s.icap.split(" ")[0])}</span>`:""}</div><span class="pill ${(s.tracePct??0)<50?'':'ok'}" style="${(s.tracePct??0)<50?'color:var(--alert);border-color:rgba(212,59,53,.4)':''}">trace ${s.tracePct??"—"}%</span></div>
        ${s.goal?`<p style="margin-top:8px;font-size:14px"><span class="hint">Goal:</span> ${esc(s.goal)}</p>`:""}
        ${s.writeup?`<details style="margin-top:6px"><summary class="hint" style="cursor:pointer">Blank-page write-up</summary><p class="hint" style="white-space:pre-wrap;margin-top:6px">${esc(s.writeup)}</p></details>`:""}
        ${s.gaps?`<p class="hint" style="margin-top:6px"><b style="color:var(--muted)">Gaps:</b> ${esc(s.gaps)}</p>`:""}
        ${s.integration?`<p class="hint" style="margin-top:6px"><b style="color:var(--muted)">Integration:</b> ${esc(s.integration)}</p>`:""}
        <button class="btn sm ghost danger" style="margin-top:10px" data-dels="${s.id}">Delete</button>
      </div>`;
    });
    html+=`</div>`;
  } else html+=`<div class="empty"><p>No sessions yet. Run one from the <a href="#" onclick="go('session');return false">Session</a> tab.</p></div>`;

  // Error analysis
  html+=`<div class="section-title">Error analysis<span class="rule"></span></div>
  <div class="card">
    <p class="hint" style="margin-bottom:14px">Use when the same mistake repeats. The last question is the important one — it's what updates the broken model.</p>
    <label class="field"><span>Error</span><input type="text" id="e-err"></label>
    <div class="grid grid-2">
      <label class="field"><span>At the moment of [action]…</span><input type="text" id="e-moment"></label>
      <label class="field"><span>My assumption was…</span><input type="text" id="e-assume"></label>
    </div>
    <label class="field"><span>What actually happened</span><input type="text" id="e-actual"></label>
    <label class="field"><span>If my assumption were FALSE, what would change?</span><textarea id="e-false"></textarea></label>
    <div class="row" style="justify-content:flex-end"><button class="btn primary" id="e-save">Save analysis</button></div>
  </div>`;
  if(DB.errors.length){
    html+=`<div class="stack" style="margin-top:14px">`;
    DB.errors.slice(0,6).forEach(e=>html+=`<div class="card"><div class="spread"><b style="font-size:14px">${esc(e.error)}</b><span class="mono" style="color:var(--faint)">${fmtShort(e.dateISO)}</span></div><p class="hint" style="margin-top:6px">Assumed: ${esc(e.assumption)} · Actually: ${esc(e.actual)}</p>${e.ifFalse?`<p class="hint" style="margin-top:4px;color:var(--retrieve)">↳ ${esc(e.ifFalse)}</p>`:""}<button class="btn sm ghost danger" style="margin-top:8px" data-dele="${e.id}">Delete</button></div>`);
    html+=`</div>`;
  }

  // Exposure log
  html+=`<div class="section-title">Exposure log · test anxiety<span class="rule"></span></div>
  <div class="card">
    <p class="hint" style="margin-bottom:14px">Log real testing situations. After 10–15 entries, the gap between what you predicted and what actually happened is evidence your prefrontal cortex can use to regulate the alarm.</p>
    <label class="field"><span>Situation</span><input type="text" id="x-sit" placeholder="e.g. mock cert exam, timed problem set"></label>
    <div class="grid grid-2">
      <label class="field"><span>Anxiety before (0–10)</span><input type="number" id="x-before" min="0" max="10" value="5"></label>
      <label class="field"><span>Anxiety after (0–10)</span><input type="number" id="x-after" min="0" max="10" value="5"></label>
    </div>
    <label class="field"><span>What I predicted would happen</span><input type="text" id="x-pred"></label>
    <label class="field"><span>What actually happened</span><input type="text" id="x-happ"></label>
    <div class="row" style="justify-content:flex-end"><button class="btn primary" id="x-save">Log exposure</button></div>
  </div>`;
  if(DB.exposures.length){
    const n=DB.exposures.length;
    const avgB=(DB.exposures.reduce((a,e)=>a+ (+e.before||0),0)/n);
    const avgA=(DB.exposures.reduce((a,e)=>a+ (+e.after||0),0)/n);
    html+=`<div class="grid grid-3" style="margin-top:14px">
      <div class="card"><div class="stat"><span class="num">${n}</span><span class="lab">entries</span></div></div>
      <div class="card"><div class="stat"><span class="num" style="color:var(--consolidate)">${avgB.toFixed(1)}</span><span class="lab">avg anxiety before</span></div></div>
      <div class="card"><div class="stat"><span class="num" style="color:var(--retrieve)">${avgA.toFixed(1)}</span><span class="lab">avg anxiety after</span></div></div>
    </div>`;
    if(n>=5) html+=`<div class="callout cool" style="margin-top:12px">Anxiety dropped <strong>${(avgB-avgA).toFixed(1)} points</strong> on average from before to after. Read your predicted-vs-happened columns below — the anticipation is consistently worse than the event.</div>`;
    html+=`<div class="card" style="padding:6px;margin-top:12px"><table class="tbl"><thead><tr><th>Date</th><th>Situation</th><th>Before</th><th>Predicted</th><th>Happened</th><th>After</th></tr></thead><tbody>`;
    DB.exposures.slice(0,12).forEach(e=>html+=`<tr><td class="mono">${fmtShort(e.dateISO)}</td><td>${esc(e.situation)}</td><td class="mono">${e.before}</td><td>${esc(e.predicted||"—")}</td><td>${esc(e.happened||"—")}</td><td class="mono">${e.after}</td></tr>`);
    html+=`</tbody></table></div>`;
  }

  after(()=>{
    $$("[data-dels]").forEach(b=>b.onclick=()=>{DB.sessions=DB.sessions.filter(x=>x.id!==b.dataset.dels);save();render();});
    $$("[data-dele]").forEach(b=>b.onclick=()=>{DB.errors=DB.errors.filter(x=>x.id!==b.dataset.dele);save();render();});
    $("#e-save").onclick=()=>{
      const err=$("#e-err").value.trim(); if(!err){toast("Name the error.");return;}
      DB.errors.unshift({id:uid(),dateISO:iso(new Date()),error:err,moment:$("#e-moment").value,assumption:$("#e-assume").value,actual:$("#e-actual").value,ifFalse:$("#e-false").value});
      save(); toast("Analysis saved"); render();
    };
    $("#x-save").onclick=()=>{
      const sit=$("#x-sit").value.trim(); if(!sit){toast("Name the situation.");return;}
      DB.exposures.unshift({id:uid(),dateISO:iso(new Date()),situation:sit,before:$("#x-before").value,after:$("#x-after").value,predicted:$("#x-pred").value,happened:$("#x-happ").value});
      save(); toast("Exposure logged"); render();
    };
  });
  return html;
};

/* =========================================================
   VIEW: REFERENCE / PRINCIPLES  (+ data management)
   ========================================================= */
Views.reference = function(){
  let html=`<div class="eyebrow">The throughline</div><h1 class="page-title">Principles</h1>
  <p class="page-intro">Strip the tactics away and the same few rules remain. When a decision isn't covered anywhere else in this console, decide from these.</p>

  <div class="card" style="text-align:center;padding:30px 20px;border-color:rgba(185,138,58,.35)">
    <div class="warnsign">
      <div class="big">If your only evidence for being "ready" is that the material feels familiar — you're not ready.</div>
      <div class="eq"><b>Time invested</b> ≠ Result produced</div>
      <div class="eq"><b>Recognition</b> ≠ Recall</div>
      <div class="eq"><b>Feeling</b> ≠ Knowing</div>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:16px">
    <div class="card"><span class="tag">01</span><h3 style="font-size:16px;margin:8px 0 6px">Diagnose before you choose</h3><p class="hint">Level is per-domain and it dictates the strategy. Every "this doesn't work for me" is a phase error until proven otherwise.</p></div>
    <div class="card"><span class="tag">02</span><h3 style="font-size:16px;margin:8px 0 6px">Produce without help</h3><p class="hint">The only valid signal is generating the knowledge under conditions unlike where you learned it. Retrieval, not re-reading.</p></div>
    <div class="card"><span class="tag">03</span><h3 style="font-size:16px;margin:8px 0 6px">Space, then verify</h3><p class="hint">Contact the trace as it decays; check your elaborations against reality. Unverified elaboration is just confident guessing.</p></div>
    <div class="card"><span class="tag">04</span><h3 style="font-size:16px;margin:8px 0 6px">Protect sleep and load</h3><p class="hint">Consolidation happens in sleep; strategies only run below the working-memory ceiling. Both are upstream of everything else.</p></div>
  </div>

  <div class="section-title">Full guide map<span class="rule"></span></div>
  <div class="card">
    <p class="hint" style="margin-bottom:12px">This console operationalizes the quick reference. The four <em>governing</em> principles and the theory live in the full guide (<span class="mono">guia_aprendizaje_mejorada</span>):</p>
    <div class="grid grid-2">
      <div style="font-size:13.5px;line-height:2">Part 0 · Four governing principles<br>Part 1 · Strategies & activation conditions<br>Part 2 · Starting-from-zero protocol<br>Part 3 · Phase-by-phase plan<br>Part 4 · Troubleshooting index</div>
      <div style="font-size:13.5px;line-height:2">Part 5 · Transition criteria<br>Part 6 · Individual differences (ADHD, anxiety)<br>Part 7 · Templates & instruments<br>Part 8 · End-to-end example<br>Part 9 · Maintenance & adherence</div>
    </div>
  </div>

  <div class="section-title">Your data<span class="rule"></span></div>
  <div class="card">
    <p class="hint" style="margin-bottom:14px">Everything lives in this browser only — nothing is uploaded. Export regularly; clearing browser data or opening the file in a different browser will not carry your logs over.</p>
    <div class="row">
      <button class="btn" id="exp">Export data (.json)</button>
      <button class="btn" id="imp">Import data</button>
      <input type="file" id="impf" accept="application/json" style="display:none">
      <button class="btn ghost danger" id="rst">Reset everything</button>
    </div>
  </div>
  <p class="hint" style="margin-top:20px;text-align:center">Built from the Learning System quick reference. Numbers are heuristics, not measurements — the console shows its reasoning so you stay the one deciding.</p>`;

  after(()=>{
    $("#exp").onclick=()=>{
      const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob); const a=document.createElement("a");
      a.href=url; a.download=`learning-console-${new Date().toISOString().slice(0,10)}.json`; a.click();
      URL.revokeObjectURL(url); toast("Exported");
    };
    $("#imp").onclick=()=>$("#impf").click();
    $("#impf").onchange=e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=()=>{ try{ const data=JSON.parse(r.result); DB=Object.assign(structuredClone(DEFAULT),data); save(); toast("Imported"); go('console'); }catch(err){ toast("Import failed — not valid data.",false); } };
      r.readAsText(f);
    };
    $("#rst").onclick=()=>{ if(confirm("Delete all domains, sessions and logs? This cannot be undone.")){ DB=structuredClone(DEFAULT); save(); toast("Reset"); go('console'); } };
  });
  return html;
};

   INIT
   ========================================================= */
$("#menuBtn").onclick=openMenu;
$("#scrim").onclick=closeMenu;
const _origGo=go;
go=function(r){ clearTimer(); clearWT(); _origGo(r); };
render();
</script>
